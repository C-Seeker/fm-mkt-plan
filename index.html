<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Marks — IB Maths Launch Dashboard</title>
<style>
:root{
  --navy:#1F3A5F; --blue:#2563EB; --green:#15803D; --amber:#B45309; --red:#DC2626;
  --bg:#F6F8FA; --card:#FFFFFF; --line:#E3E8EF; --text:#1A2331; --muted:#6B7684; --faint:#9AA5B1;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ---------- header ---------- */
header{background:var(--navy);color:#fff;padding:16px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:800;letter-spacing:-.2px}
header .sub{font-size:12px;color:#A9BDD6}
header .spacer{flex:1}
.hbtn{background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.22);padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,.22)}
.hbtn:disabled{opacity:.4;cursor:not-allowed}
.hbtn.g{background:#fff;color:#3C4043;border-color:#fff;display:inline-flex;align-items:center;gap:8px}
.hbtn.g:hover{background:#F1F3F4}

/* ---------- auth ---------- */
.me{display:flex;align-items:center;gap:9px;padding:4px 11px 4px 4px;background:rgba(255,255,255,.11);border-radius:99px}
.av{width:27px;height:27px;border-radius:50%;background:#7C9BC0;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.me .nm{font-size:12.5px;font-weight:600;line-height:1.2}
.me .rl{font-size:10px;color:#A9BDD6;line-height:1.2}
.banner{padding:11px 26px;font-size:12.8px;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.banner.view{background:#EFF6FF;color:#1E40AF;border-bottom:1px solid #BFDBFE}
.banner.deny{background:#FEF2F2;color:#991B1B;border-bottom:1px solid #FECACA}
.banner.off{background:#FFFBEB;color:#92400E;border-bottom:1px solid #FDE68A}
.banner b{font-weight:800}
.banner .lnk{margin-left:auto;font-weight:700;text-decoration:underline;cursor:pointer;background:none;border:none;font-size:12.8px;font-family:inherit;color:inherit}
.ro{opacity:.55;pointer-events:none}
.by{font-size:10.5px;color:var(--faint);white-space:nowrap}
.by b{color:var(--muted);font-weight:700}
.sync{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#A9BDD6}
.dot{width:7px;height:7px;border-radius:50%;background:#4ADE80}
.dot.slow{background:#FBBF24}
.dot.dead{background:#F87171}

/* ---------- activity feed ---------- */
.feed{max-height:270px;overflow-y:auto}
.fitem{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #F1F4F7;font-size:12.5px}
.fitem:last-child{border:none}
.fitem .fav{width:23px;height:23px;border-radius:50%;background:#E2E8F0;color:#475569;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.fitem .ft{flex:1;min-width:0}
.fitem .fw{font-weight:700}
.fitem .fm{color:var(--muted)}
.fitem .fd{font-size:10.5px;color:var(--faint);white-space:nowrap}

/* ---------- tabs ---------- */
nav{background:var(--card);border-bottom:1px solid var(--line);padding:0 26px;display:flex;gap:2px;position:sticky;top:0;z-index:50;overflow-x:auto}
.tab{padding:13px 16px;border:none;background:none;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;white-space:nowrap;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

main{padding:22px 26px 60px;max-width:1320px;margin:0 auto}

/* ---------- generic ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:18px;margin-bottom:16px}
h2.sec{font-size:16px;font-weight:800;margin-bottom:4px}
p.sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* ---------- KPI ---------- */
.kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:15px}
.kpi .lbl{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.kpi .val{font-size:27px;font-weight:800;line-height:1.1}
.kpi .note{font-size:11.5px;color:var(--muted);margin-top:3px}

.gate{border-radius:11px;padding:15px 18px;display:flex;align-items:center;gap:14px;margin-bottom:16px;border:1px solid}
.gate.no{background:#FEF2F2;border-color:#FCA5A5}
.gate.yes{background:#F0FDF4;border-color:#86EFAC}
.gate .icon{font-size:26px}
.gate .t{font-weight:800;font-size:14.5px}
.gate .d{font-size:12.5px;color:var(--muted);margin-top:2px}

/* ---------- progress ---------- */
.bar{background:#EDF1F5;border-radius:99px;height:9px;overflow:hidden;flex:1}
.bar>span{display:block;height:100%;border-radius:99px;background:var(--blue);transition:width .35s}
.prow{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.prow .nm{width:118px;font-size:12.5px;font-weight:600;flex-shrink:0}
.prow .pc{width:52px;text-align:right;font-size:12px;font-weight:700;color:var(--muted)}

/* ---------- day strip ---------- */
.days{display:grid;grid-template-columns:repeat(10,1fr);gap:7px}
.day{border:1px solid var(--line);border-radius:9px;padding:9px 5px;text-align:center;cursor:pointer;background:var(--card);transition:.15s}
.day:hover{border-color:var(--blue)}
.day .n{font-size:17px;font-weight:800}
.day .s{font-size:9.5px;color:var(--muted);margin-top:2px}
.day .mini{height:4px;border-radius:99px;background:#EDF1F5;margin-top:6px;overflow:hidden}
.day .mini>span{display:block;height:100%;background:var(--green)}
.day.done{background:#F0FDF4;border-color:#86EFAC}
.day.active{background:#EFF6FF;border-color:var(--blue)}

/* ---------- filters ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
select,input[type=text],input[type=number],textarea{padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text);outline:none}
select:focus,input:focus,textarea:focus{border-color:var(--blue)}
.chip{padding:6px 12px;border:1px solid var(--line);border-radius:99px;background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ---------- task list ---------- */
.tgroup{margin-bottom:20px}
.thead{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--navy);color:#fff;border-radius:8px 8px 0 0}
.thead .dn{background:rgba(255,255,255,.16);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:800}
.thead .tt{font-weight:700;font-size:13.5px}
.thead .tc{margin-left:auto;font-size:11.5px;color:#B9CBE0}
.task{display:flex;gap:11px;padding:11px 13px;border:1px solid var(--line);border-top:none;background:var(--card);align-items:flex-start}
.task:last-child{border-radius:0 0 8px 8px}
.task.done{background:#FAFDFB}
.task.done .tx{text-decoration:line-through;color:var(--faint)}
.cb{width:17px;height:17px;margin-top:2px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.task .body{flex:1;min-width:0}
.task .tx{font-size:13.2px;font-weight:500}
.task .meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.pill{padding:2px 7px;border-radius:99px;font-size:10px;font-weight:800;letter-spacing:.02em}
.pill.crit{background:#FEE2E2;color:var(--red)}
.pill.high{background:#FEF3C7;color:var(--amber)}
.pill.med{background:#E0E7FF;color:#4338CA}
.ws{padding:2px 7px;border-radius:5px;background:#EEF2F6;color:var(--muted);font-size:10px;font-weight:700}
.deliv{color:var(--green);font-weight:600}
.note-in{width:100%;margin-top:7px;font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit;display:none}
.task.open .note-in{display:block}
.notebtn{background:none;border:none;cursor:pointer;color:var(--faint);font-size:14px;padding:0 3px;font-family:inherit}
.notebtn:hover{color:var(--blue)}
.notebtn.has{color:var(--amber)}

/* ---------- route cards ---------- */
.route{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--card)}
.route .rh{padding:13px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.route .rid{background:rgba(255,255,255,.2);border-radius:6px;padding:3px 9px;font-size:11.5px;font-weight:800}
.route .rt{font-weight:800;font-size:14.5px}
.route .rb{padding:14px 16px}
.rrow{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #F1F4F7;font-size:12.8px}
.rrow:last-child{border:none}
.rrow .k{width:112px;flex-shrink:0;color:var(--muted);font-weight:700;font-size:11.5px}
.rrow .v{flex:1}

/* ---------- table ---------- */
table{width:100%;border-collapse:collapse;font-size:12.8px}
th{background:var(--navy);color:#fff;text-align:left;padding:9px 11px;font-size:11.5px;font-weight:700}
th:first-child{border-radius:7px 0 0 0}
th:last-child{border-radius:0 7px 0 0}
td{padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:nth-child(even){background:#FAFBFC}
td input{width:100%;padding:4px 7px;font-size:12.5px}
.st{padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:800;display:inline-block}
.st.ok{background:#DCFCE7;color:var(--green)}
.st.bad{background:#FEE2E2;color:var(--red)}
.st.none{background:#F1F4F7;color:var(--faint)}

.hint{background:#FFFBEB;border-left:3px solid #F59E0B;border-radius:0 8px 8px 0;padding:11px 14px;font-size:12.7px;color:#78350F;margin-bottom:14px}
.hint b{color:#92400E}

footer{text-align:center;padding:26px;font-size:11.5px;color:var(--faint)}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

@media(max-width:900px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .days{grid-template-columns:repeat(5,1fr)}
  main{padding:16px 14px 50px}
  header,nav{padding-left:14px;padding-right:14px}
}
</style>
</head>

   STATE
   Two modes:
     cloud  — Supabase configured. Shared, live, attributed.
     local  — no config or offline. Browser-only, exactly as before.
   ===================================================================== */
const KEY = 'fm_launch_v1';
const CLOUD = !!(SUPABASE_URL && SUPABASE_ANON_KEY);

let S = load();
let sb = null;            // supabase client
let me = null;            // {email, name, avatar}
let canEdit = false;      // signed in AND on the allowlist
let feed = [];            // recent activity
let connState = CLOUD ? 'connecting' : 'local';

function blank(){
  return {
    start:'2026-07-20',
    tasks:{},        // id -> {done, note, by, byName, at}
    assets:{},       // id -> {done, by, byName, at}
    metrics:{},      // id -> {tgt, act, by, byName, at}
    routes:{},       // id -> {status, by, byName, at}  (legacy: plain string)
    filter:{day:'all', ws:'all', hide:false},
    tab:'dash'
  };
}
function load(){
  try{ const r = localStorage.getItem(KEY); if(r) return Object.assign(blank(), JSON.parse(r)); }catch(e){}
  return blank();
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

/* Routes were once stored as a bare string. Normalise on read so old
   saved state keeps working. */
function routeStatus(id){
  const r = S.routes[id];
  if(!r) return 'Not started';
  return typeof r === 'string' ? r : (r.status || 'Not started');
}
function routeMeta(id){
  const r = S.routes[id];
  return (r && typeof r === 'object') ? r : null;
}

/* ---------- attribution ---------- */
function stamp(obj){
  if(!me) return obj;
  return Object.assign({}, obj, {by:me.email, byName:me.name, at:new Date().toISOString()});
}
function initials(n){
  return String(n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}
function ago(iso){
  if(!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
  if(s < 45) return 'just now';
  if(s < 3600) return Math.floor(s/60) + 'm ago';
  if(s < 86400) return Math.floor(s/3600) + 'h ago';
  if(s < 604800) return Math.floor(s/86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
}
function byLine(o){
  if(!o || !o.byName || !o.at) return '';
  return `<span class="by">✓ <b>${esc(o.byName)}</b> · ${ago(o.at)}</span>`;
}

/* =====================================================================
   SUPABASE — connect, authenticate, sync
   ===================================================================== */
async function initCloud(){
  if(!CLOUD){ paintAuth(); return; }
  try{
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data:{ session } } = await sb.auth.getSession();
    await onSession(session);

    sb.auth.onAuthStateChange((_e, s) => { onSession(s); });

    await pullAll();
    subscribe();
    connState = 'live';
  }catch(err){
    console.warn('Cloud init failed, staying local:', err);
    connState = 'offline';
  }
  paintAuth(); render();
}

async function onSession(session){
  if(session && session.user){
    const u = session.user;
    me = {
      email: (u.email||'').toLowerCase(),
      name: u.user_metadata?.full_name || u.user_metadata?.name || (u.email||'').split('@')[0],
      avatar: u.user_metadata?.avatar_url || u.user_metadata?.picture || ''
    };
    canEdit = await checkEditor();
  } else {
    me = null; canEdit = false;
  }
  paintAuth(); render();
}

async function checkEditor(){
  if(!sb || !me) return false;
  try{
    const { data, error } = await sb.rpc('is_editor');
    if(error){ console.warn('is_editor failed:', error.message); return false; }
    return data === true;
  }catch(e){ return false; }
}

async function signIn(){
  if(!sb) return;
  await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: window.location.href.split('#')[0] }
  });
}
async function signOut(){
  if(!sb) return;
  await sb.auth.signOut();
  me = null; canEdit = false;
  paintAuth(); render();
}

/* ---------- pull everything ---------- */
async function pullAll(){
  if(!sb) return;
  const { data, error } = await sb.from('board_state').select('*');
  if(error){ console.warn('pull failed:', error.message); connState='offline'; return; }

  const fresh = blank();
  fresh.filter = S.filter; fresh.tab = S.tab;
  for(const row of (data||[])){
    const meta = { by: row.updated_by, byName: row.updated_by_name, at: row.updated_at };
    const val = Object.assign({}, row.data, meta);
    if(row.kind === 'task')   fresh.tasks[row.item_id]   = val;
    if(row.kind === 'asset')  fresh.assets[row.item_id]  = val;
    if(row.kind === 'metric') fresh.metrics[row.item_id] = val;
    if(row.kind === 'route')  fresh.routes[row.item_id]  = val;
  }
  S = fresh; save();
  await pullFeed();
}

async function pullFeed(){
  if(!sb) return;
  const { data, error } = await sb
    .from('activity_log').select('*')
    .order('created_at', {ascending:false}).limit(30);
  if(!error) feed = data || [];
}

/* ---------- push one item ---------- */
async function push(kind, itemId, data, label, action){
  if(!sb || !canEdit) return;
  const row = {
    kind, item_id:itemId, data,
    updated_by: me.email, updated_by_name: me.name,
    updated_at: new Date().toISOString()
  };
  const { error } = await sb.from('board_state').upsert(row, {onConflict:'kind,item_id'});
  if(error){ console.warn('push failed:', error.message); toast('Could not save — check your connection.'); return; }

  if(action){
    await sb.from('activity_log').insert({
      kind, item_id:itemId, label, action,
      actor_email: me.email, actor_name: me.name
    });
  }
}

/* ---------- realtime ---------- */
function subscribe(){
  if(!sb) return;
  sb.channel('board')
    .on('postgres_changes', {event:'*', schema:'public', table:'board_state'}, payload => {
      const r = payload.new; if(!r) return;
      if(r.updated_by === (me && me.email)) return;   // our own echo
      const val = Object.assign({}, r.data, {by:r.updated_by, byName:r.updated_by_name, at:r.updated_at});
      if(r.kind==='task')   S.tasks[r.item_id]   = val;
      if(r.kind==='asset')  S.assets[r.item_id]  = val;
      if(r.kind==='metric') S.metrics[r.item_id] = val;
      if(r.kind==='route')  S.routes[r.item_id]  = val;
      save(); render();
    })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'activity_log'}, payload => {
      if(payload.new){ feed.unshift(payload.new); feed = feed.slice(0,30);
        if(S.tab==='dash') render(); }
    })
    .subscribe(status => {
      connState = (status === 'SUBSCRIBED') ? 'live' : 'offline';
      paintSync();
    });
}

/* ---------- tiny toast ---------- */
let toastT;
function toast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1A2331;color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;z-index:999;box-shadow:0 6px 22px rgba(0,0,0,.22)';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.display='block';
  clearTimeout(toastT); toastT = setTimeout(()=>{ t.style.display='none'; }, 2600);
}

/* ---------- write guard ---------- */
function guard(){
  if(!CLOUD) return true;              // local mode: always writable
  if(!me){ toast('Sign in to make changes.'); return false; }
  if(!canEdit){ toast('Your account is not approved for editing.'); return false; }
  return true;
}

/* ---------- helpers ---------- */
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const canWrite = () => !CLOUD || canEdit;
const tDone = id => !!(S.tasks[id]||{}).done;
const aDone = id => !!(S.assets[id]||{}).done;
const pct   = (a,b) => b ? Math.round(a/b*100) : 0;

function stats(){
  const total = TASKS.length;
  const done  = TASKS.filter(t=>tDone(t.id)).length;
  const crit  = TASKS.filter(t=>t.p==='Critical');
  const critDone = crit.filter(t=>tDone(t.id)).length;
  const req   = ASSETS.filter(a=>a[3]===1);
  const reqDone = req.filter(a=>aDone(a[0])).length;
  const routesReady = ROUTES.filter(r=>S.routes[r.id]==='Ready').length;
  return {total,done,crit:crit.length,critDone,req:req.length,reqDone,routesReady};
}

function dayStats(d){
  const ts = TASKS.filter(t=>t.d===d);
  return {n:ts.length, done:ts.filter(t=>tDone(t.id)).length};
}

/* ---------- nav ---------- */
function go(t){
  S.tab=t; save();
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.t===t));
  render();
  window.scrollTo(0,0);
}

function render(){
  const m = document.getElementById('main');
  const t = S.tab;
  if(t==='dash')    m.innerHTML = viewDash();
  else if(t==='plan')   m.innerHTML = viewPlan();
  else if(t==='routes') m.innerHTML = viewRoutes();
  else if(t==='assets') m.innerHTML = viewAssets();
  else if(t==='metrics')m.innerHTML = viewMetrics();
  else if(t==='ads')    m.innerHTML = viewAds();
}

   ===================================================================== */
function viewDash(){
  const s = stats();
  const gateOK = s.critDone===s.crit && s.reqDone===s.req && s.routesReady===ROUTES.length;

  const workstreams = [...new Set(TASKS.map(t=>t.w))];
  const wsRows = workstreams.map(w=>{
    const ts = TASKS.filter(t=>t.w===w);
    const dn = ts.filter(t=>tDone(t.id)).length;
    return `<div class="prow"><div class="nm">${w}</div><div class="bar"><span style="width:${pct(dn,ts.length)}%"></span></div><div class="pc">${dn}/${ts.length}</div></div>`;
  }).join('');

  const dayCells = Object.keys(DAYTITLES).map(d=>{
    d = +d;
    const ds = dayStats(d);
    const p = pct(ds.done, ds.n);
    const cls = p===100 ? 'done' : (ds.done>0 ? 'active' : '');
    return `<div class="day ${cls}" onclick="S.filter.day='${d}';go('plan')" title="${esc(DAYTITLES[d])}">
      <div class="n">${d}</div><div class="s">${ds.done}/${ds.n}</div>
      <div class="mini"><span style="width:${p}%"></span></div></div>`;
  }).join('');

  return `
  <div class="gate ${gateOK?'yes':'no'}">
    <div class="icon">${gateOK?'✅':'⛔'}</div>
    <div>
      <div class="t">${gateOK?'Ready for soft launch':'Not ready for soft launch'}</div>

        ? 'All critical tasks complete, all required assets ready, all four routes tested. Launch small and watch it live.'

    <div class="kpi"><div class="lbl">Critical tasks</div><div class="val" style="color:${s.critDone===s.crit?'var(--green)':'var(--red)'}">${pct(s.critDone,s.crit)}%</div><div class="note">${s.critDone} of ${s.crit} complete</div></div>
    <div class="kpi"><div class="lbl">Required assets</div><div class="val" style="color:${s.reqDone===s.req?'var(--green)':'var(--amber)'}">${pct(s.reqDone,s.req)}%</div><div class="note">${s.reqDone} of ${s.req} ready</div></div>
    <div class="kpi"><div class="lbl">Routes tested</div><div class="val" style="color:${s.routesReady===ROUTES.length?'var(--green)':'var(--muted)'}">${s.routesReady}/${ROUTES.length}</div><div class="note">R1 · R2 · R3 · R4</div></div>
  </div>

  <div class="card">
    <h2 class="sec">Progress by day</h2>
    <p class="sub">Click any day to jump to its tasks.</p>
    <div class="days">${dayCells}</div>
  </div>

  <div class="grid2">
    <div class="card">
      <h2 class="sec">Progress by workstream</h2>
      <p class="sub">Where the remaining work actually sits.</p>
      ${wsRows}
    </div>
    <div class="card">
      <h2 class="sec">The three channels</h2>
      <p class="sub">Everything in this dashboard serves these and nothing else.</p>
      ${ROUTES.map(r=>`
        <div class="prow" style="align-items:flex-start">
          <div style="width:34px;flex-shrink:0"><span class="pill" style="background:${r.c}22;color:${r.c}">${r.id}</span></div>

            <div style="font-weight:700;font-size:12.8px">${r.name}</div>
            <div style="font-size:11.5px;color:var(--muted)">${r.chan} → ${r.dest}</div>
          </div>
          <div style="font-size:11px;font-weight:700;color:${S.routes[r.id]==='Ready'?'var(--green)':'var(--faint)'}">${S.routes[r.id]||'Not tested'}</div>
        </div>`).join('')}
    </div>
  </div>

  ${CLOUD ? `<div class="card">
    <h2 class="sec">Recent activity</h2>
    <p class="sub">${feed.length ? 'Every change, and who made it. Updates live.' : 'No changes recorded yet.'}</p>
    <div class="feed">
      ${feed.length ? feed.map(f=>`
        <div class="fitem">
          <div class="fav">${esc(initials(f.actor_name))}</div>
          <div class="ft">
            <span class="fw">${esc(f.actor_name||'Someone')}</span>
            <span class="fm">${esc(f.action)}</span>
            <span class="fw">${esc(f.label||f.item_id)}</span>
          </div>
          <div class="fd">${ago(f.created_at)}</div>
        </div>`).join('')
        : '<div style="color:var(--faint);font-size:12.5px;padding:8px 0">Changes will appear here as people tick things off.</div>'}
    </div>
  </div>` : ''}

  <div class="hint"><b>Sequence matters.</b> Days 1–3 settle what you are selling and build the proof asset. Everything after depends on them. If Day 1 reveals the product is not ready, fix that before continuing.</div>
  `;
}

/* =====================================================================
   10-DAY PLAN
   ===================================================================== */
function viewPlan(){
  const f = S.filter;
  const wss = [...new Set(TASKS.map(t=>t.w))];
  let list = TASKS.filter(t =>
    (f.day==='all' || t.d===+f.day) &&
    (f.ws==='all'  || t.w===f.ws) &&
    (!f.hide || !tDone(t.id))
  );

  const days = [...new Set(list.map(t=>t.d))].sort((a,b)=>a-b);
  const groups = days.map(d=>{
    const ts = list.filter(t=>t.d===d);
    const ds = dayStats(d);
    return `<div class="tgroup">
      <div class="thead">
        <div class="dn">DAY ${d}</div>
        <div class="tt">${esc(DAYTITLES[d])}</div>
        <div class="tc">${ds.done}/${ds.n} complete</div>
      </div>
      ${ts.map(t=>{
        const st = S.tasks[t.id]||{};
        const has = st.note && st.note.trim();
        return `<div class="task ${st.done?'done':''} ${has?'open':''}" id="row-${t.id}">
          <input type="checkbox" class="cb" ${st.done?'checked':''} ${canWrite()?'':'disabled'}
                 onchange="tog('${t.id}',this.checked)">
          <div class="body">
            <div class="tx">${esc(t.t)}</div>
            <div class="meta">
              <span class="pill ${t.p==='Critical'?'crit':t.p==='High'?'high':'med'}">${t.p}</span>
              <span class="ws">${t.w}</span>
              <span class="deliv">→ ${esc(t.v)}</span>
              <span style="color:var(--faint)">${t.id}</span>
              <button class="notebtn ${has?'has':''}" onclick="toggleNote('${t.id}')" title="Notes">✎</button>
              ${st.done ? byLine(st) : ''}
            </div>
            <textarea class="note-in" rows="2" placeholder="Notes, links, blockers…"
              ${canWrite()?'':'readonly'}
              oninput="setNote('${t.id}',this.value)">${esc(st.note||'')}</textarea>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('') || '<div class="card" style="text-align:center;color:var(--faint)">Nothing matches these filters.</div>';

  return `
  <div class="card">
    <h2 class="sec">10-Day Launch Plan</h2>
    <p class="sub">${TASKS.length} tasks. Do not start a day until the previous day's critical tasks are done.</p>
    <div class="filters">
      <select onchange="S.filter.day=this.value;save();render()">
        <option value="all"${f.day==='all'?' selected':''}>All days</option>
        ${Object.keys(DAYTITLES).map(d=>`<option value="${d}"${f.day===d?' selected':''}>Day ${d} — ${esc(DAYTITLES[d])}</option>`).join('')}
      </select>
      <select onchange="S.filter.ws=this.value;save();render()">
        <option value="all"${f.ws==='all'?' selected':''}>All workstreams</option>
        ${wss.map(w=>`<option${f.ws===w?' selected':''}>${w}</option>`).join('')}
      </select>
      <button class="chip ${f.hide?'on':''}" onclick="S.filter.hide=!S.filter.hide;save();render()">Hide completed</button>
      <span style="margin-left:auto;font-size:12px;color:var(--muted)">Showing ${list.length} of ${TASKS.length}</span>
    </div>
  </div>
  ${groups}`;
}

function tog(id, v){
  if(!guard()){ const cb = document.querySelector(`#row-${id} .cb`); if(cb) cb.checked = !v; return; }
  const prev = S.tasks[id] || {};
  S.tasks[id] = stamp(Object.assign({}, prev, {done:v}));
  save();
  const t = TASKS.find(x=>x.id===id);
  push('task', id, {done:v, note:prev.note||''}, t?t.t:id, v?'completed':'reopened');
  render();
}
function toggleNote(id){ const el = document.getElementById('row-'+id); if(el) el.classList.toggle('open'); }

let noteT = {};
function setNote(id,v){
  if(!guard()) return;
  const prev = S.tasks[id] || {};
  S.tasks[id] = stamp(Object.assign({}, prev, {note:v}));
  save();
  clearTimeout(noteT[id]);
  noteT[id] = setTimeout(()=>{
    const t = TASKS.find(x=>x.id===id);
    push('task', id, {done:!!prev.done, note:v}, t?t.t:id, 'updated a note on');
  }, 900);
}

/* =====================================================================
   ROUTES
   ===================================================================== */

  return `
  <div class="card">
    <h2 class="sec">Four funnel routes</h2>
    <p class="sub">Reduced from seven. The three you removed depended on SEO, topic-catalogue browsing and an existing customer base — none of which you have yet.</p>
    <div class="hint"><b>The routing principle.</b> Cold traffic gets proof before it gets a price. Warm and high-intent traffic goes straight to the product — a lead gate there only adds friction to someone already ready to buy.</div>
  </div>

  <div class="grid2">
    ${ROUTES.map(r=>`
      <div class="route">
        <div class="rh" style="background:${r.c}">
          <div class="rid">${r.id}</div>
          <div class="rt">${r.name}</div>
          <div style="margin-left:auto;font-size:11.5px;opacity:.9">${r.chan}</div>
        </div>
        <div class="rb">
          <div class="rrow"><div class="k">Who</div><div class="v">${esc(r.who)}</div></div>
          <div class="rrow"><div class="k">Message</div><div class="v"><i>${esc(r.msg)}</i></div></div>
          <div class="rrow"><div class="k">Destination</div><div class="v"><b>${esc(r.dest)}</b></div></div>
          <div class="rrow"><div class="k">CTA</div><div class="v">${esc(r.cta)}</div></div>
          <div class="rrow"><div class="k">Next step</div><div class="v">${esc(r.next)}</div></div>
          <div class="rrow"><div class="k">Purchase</div><div class="v">${esc(r.buy)}</div></div>
          <div class="rrow"><div class="k">CRM tag</div><div class="v"><code style="background:#F1F4F7;padding:1px 6px;border-radius:4px;font-size:11.5px">${r.tag}</code></div></div>
          <div class="rrow"><div class="k">Success metric</div><div class="v">${esc(r.metric)}</div></div>
          <div class="rrow"><div class="k">Build status</div><div class="v">
            <select ${canWrite()?'':'disabled'} onchange="setRoute('${r.id}',this.value)">
              ${['Not started','In progress','Ready'].map(o=>`<option${routeStatus(r.id)===o?' selected':''}>${o}</option>`).join('')}
            </select>
            ${routeMeta(r.id) ? `<div style="margin-top:4px">${byLine(routeMeta(r.id))}</div>` : ''}
            </div></div>
        </div>
      </div>`).join('')}
  </div>

  <div class="card">
    <h2 class="sec">Routing decision rules</h2>
    <p class="sub">When a visitor shows one of these signals, send them here.</p>
    <table>
      <thead><tr><th style="width:26%">Signal</th><th style="width:20%">Route</th><th style="width:20%">Destination</th><th>Why</th></tr></thead>
      <tbody>${RULES.map(r=>`<tr><td><b>${esc(r[0])}</b></td><td>${esc(r[1])}</td><td>${esc(r[2])}</td><td style="color:var(--muted)">${esc(r[3])}</td></tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function setRoute(id, v){
  if(!guard()){ render(); return; }
  S.routes[id] = stamp({status:v});
  save();
  const r = ROUTES.find(x=>x.id===id);
  push('route', id, {status:v}, r?`${r.id} ${r.name}`:id, `set ${v.toLowerCase()} on`);
  render();
}

/* =====================================================================
   ASSETS
   ===================================================================== */
function viewAssets(){
  const cats = [...new Set(ASSETS.map(a=>a[1]))];
  const req = ASSETS.filter(a=>a[3]===1);
  const reqDone = req.filter(a=>aDone(a[0])).length;

  return `
  <div class="card">
    <h2 class="sec">Asset checklist</h2>
    <p class="sub">${ASSETS.length} assets · ${req.length} required before launch · ${reqDone} ready</p>
    <div class="prow"><div class="nm">Required assets</div><div class="bar"><span style="width:${pct(reqDone,req.length)}%;background:${reqDone===req.length?'var(--green)':'var(--blue)'}"></span></div><div class="pc">${pct(reqDone,req.length)}%</div></div>
  </div>
  ${cats.map(c=>{
    const items = ASSETS.filter(a=>a[1]===c);
    const dn = items.filter(a=>aDone(a[0])).length;
    return `<div class="tgroup">
      <div class="thead"><div class="tt">${esc(c)}</div><div class="tc">${dn}/${items.length} ready</div></div>
      ${items.map(a=>{
        const st = S.assets[a[0]]||{};
        return `<div class="task ${st.done?'done':''}">
          <input type="checkbox" class="cb" ${st.done?'checked':''} ${canWrite()?'':'disabled'}
                 onchange="togA('${a[0]}',this.checked)">
          <div class="body">
            <div class="tx">${esc(a[2])}</div>
            <div class="meta">
              <span style="color:var(--faint)">${a[0]}</span>
              ${a[3]===1?'<span class="pill crit">Required</span>':'<span class="pill med">Optional</span>'}
              ${st.done ? byLine(st) : ''}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}`;
}
function togA(id,v){
  if(!guard()){ render(); return; }
  S.assets[id] = stamp(Object.assign({}, S.assets[id], {done:v}));
  save();
  const a = ASSETS.find(x=>x[0]===id);
  push('asset', id, {done:v}, a?a[2]:id, v?'marked ready':'reopened');
  render();
}

/* =====================================================================
   METRICS
   ===================================================================== */
function viewMetrics(){
  return `
  <div class="card">
    <h2 class="sec">Metrics that matter</h2>
    <p class="sub">Reduced from 27 to ${METRICS.length}. Enter your actuals as data comes in — status calculates automatically.</p>
    <div class="hint"><b>Do not judge too early.</b> Use the first 100–200 qualified visits and first 30–50 leads to establish a baseline. Scale a channel on lead quality and downstream behaviour, never on cheap clicks alone.</div>
    <table>
      <thead><tr><th style="width:8%">ID</th><th style="width:20%">Route</th><th style="width:30%">Metric</th><th style="width:9%">Unit</th><th style="width:12%">Target</th><th style="width:12%">Actual</th><th style="width:9%">Status</th></tr></thead>
      <tbody>
        ${METRICS.map(m=>{
          const st = S.metrics[m.id]||{};
          const tgt = st.tgt!==undefined ? st.tgt : m.tgt;
          const act = st.act!==undefined ? st.act : '';
          let badge = '<span class="st none">No data</span>';
          if(act!=='' && tgt!==''){
            const ok = parseFloat(act) >= parseFloat(tgt);
            const inv = m.m.toLowerCase().includes('cost') || m.m.toLowerCase().includes('hours to');
            const good = inv ? parseFloat(act) <= parseFloat(tgt) : ok;
            badge = good ? '<span class="st ok">On track</span>' : '<span class="st bad">Below</span>';
          }
          return `<tr>
            <td style="color:var(--faint)">${m.id}</td>
            <td>${esc(m.r)}</td>
            <td><b>${esc(m.m)}</b></td>
            <td style="color:var(--muted)">${m.u}</td>
            <td><input type="text" value="${esc(tgt)}" placeholder="—" ${canWrite()?'':'readonly'} oninput="setM('${m.id}','tgt',this.value)"></td>
            <td><input type="text" value="${esc(act)}" placeholder="—" ${canWrite()?'':'readonly'} oninput="setM('${m.id}','act',this.value)"></td>
            <td>${badge}${st.byName ? `<div style="margin-top:3px">${byLine(st)}</div>` : ''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}
let mT;
function setM(id,k,v){
  if(!guard()) return;
  const prev = S.metrics[id] || {};
  S.metrics[id] = stamp(Object.assign({}, prev, {[k]:v}));
  save();
  clearTimeout(mT);
  mT = setTimeout(()=>{
    const cur = S.metrics[id] || {};
    const m = METRICS.find(x=>x.id===id);
    push('metric', id, {tgt:cur.tgt??'', act:cur.act??''}, m?m.m:id,
         k==='act' ? 'recorded a result for' : 'set a target for');
    render();
  }, 800);
}

/* =====================================================================
   ADS SETUP
   ===================================================================== */
function viewAds(){
  return `
  <div class="card">
    <h2 class="sec">Ads setup — Facebook and LinkedIn only</h2>
    <p class="sub">Instagram, teacher groups, SEO and search ads removed. These are the campaigns you actually run.</p>
    <div class="hint"><b>The one rule.</b> Cold Facebook traffic points at the sample pack, never at the pricing page. Warm and retargeted traffic points at the product page. LinkedIn points at the school quote.</div>
    <table>
      <thead><tr><th style="width:16%">Campaign</th><th style="width:12%">Channel</th><th style="width:14%">Objective</th><th style="width:30%">Audience</th><th>Destination</th></tr></thead>
      <tbody>
        <tr><td><b>C1 — Cold sample</b></td><td>Facebook</td><td>Leads</td><td>IB and international-school interest clusters</td><td>Sample-pack landing page (R1)</td></tr>
        <tr><td><b>C2 — Warm retarget</b></td><td>Facebook</td><td>Conversions</td><td>Site visitors, video viewers 25%+, page engagers</td><td>Product page (R4)</td></tr>
        <tr><td><b>C3 — Lead retarget</b></td><td>Facebook</td><td>Conversions</td><td>Downloaded the sample, has not purchased</td><td>Product page / pricing (R4)</td></tr>
        <tr><td><b>C4 — School</b></td><td>LinkedIn</td><td>Lead gen forms</td><td>Head of Maths · DP Coordinator · Head of Secondary · Curriculum Coordinator · Academic Director</td><td>School quote page (R3)</td></tr>
        <tr><td><b>C5 — Lookalike</b></td><td>Facebook</td><td>Leads</td><td style="color:var(--muted)">Build only after 50+ qualified conversions</td><td>Sample-pack landing page (R1)</td></tr>
      </tbody>
    </table>
  </div>

  <div class="grid2">
    <div class="card">
      <h2 class="sec">Creative to test</h2>
      <p class="sub">Five formats. Produce at least three teacher and two department variants.</p>
      <table>
        <thead><tr><th style="width:34%">Format</th><th>Why it works</th></tr></thead>
        <tbody>
          <tr><td><b>Screen recording 15–25s</b></td><td>One lesson across six matching assets — proves the integration claim in seconds. Strongest format.</td></tr>
          <tr><td><b>Before / after static</b></td><td>Scattered folders on the left, one aligned sequence on the right.</td></tr>
          <tr><td><b>Carousel</b></td><td>Presentation → teacher notes → student notes → worksheet → assessment → pacing.</td></tr>
          <tr><td><b>Founder video</b></td><td>Direct to camera: why the kit was built, by a teacher, for teachers.</td></tr>
          <tr><td><b>Department ad</b></td><td>Standardisation and onboarding — not personal time saving. LinkedIn primary.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <h2 class="sec">Ad hooks</h2>
      <p class="sub">Test these against each other. Primary CTA on every cold ad: "Get the free sample lesson."</p>
      <table>
        <thead><tr><th style="width:74%">Hook</th><th>For</th></tr></thead>
        <tbody>
          <tr><td>"What would you do with 100 planning hours back?"</td><td>R1</td></tr>
          <tr><td>"New to IB Maths? Teach from a coherent course instead of assembling one."</td><td>R1</td></tr>
          <tr><td>"A folder full of resources is not a curriculum."</td><td>R1</td></tr>
          <tr><td>"See one lesson where the slides, notes, worksheet and assessment actually match."</td><td>R1</td></tr>
          <tr><td>"Stop rebuilding the same course every weekend."</td><td>R4</td></tr>
          <tr><td>"Teach the course. Stop rebuilding it."</td><td>R2 · R4</td></tr>
          <tr><td>"A shared IB Maths course system that survives staff turnover."</td><td>R3</td></tr>
          <tr><td>"Standardise delivery and reduce onboarding risk."</td><td>R3</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <h2 class="sec">Budget phasing</h2>
    <p class="sub">Start small. The first two weeks are for learning, not volume.</p>
    <table>
      <thead><tr><th style="width:16%">Phase</th><th style="width:30%">Split</th><th>What you are looking for</th></tr></thead>
      <tbody>
        <tr><td><b>Week 1 — Soft launch</b></td><td>100% Facebook cold (C1)</td><td>Does anyone claim the sample? Is the landing page converting?</td></tr>
        <tr><td><b>Week 2 — Add retarget</b></td><td>70% cold / 30% retarget (C1 + C2)</td><td>Do leads open the sample and watch the product tour?</td></tr>
        <tr><td><b>Week 3 — Add LinkedIn</b></td><td>50% cold / 30% retarget / 20% LinkedIn</td><td>Any qualified school quote requests?</td></tr>
        <tr><td><b>Week 4+ — Scale</b></td><td>Follow the data</td><td>Cost per qualified lead and 7-day purchase rate — not cost per click.</td></tr>

  <div class="card">
    <h2 class="sec">What not to do</h2>

/* =====================================================================
   IMPORT / EXPORT / RESET
   ===================================================================== */
function expJSON(){
  const payload = { exported: new Date().toISOString(), board: S, activity: feed };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fm-launch-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

/* =====================================================================
   EXPOSE — inline handlers need these on window because this is a module
   ===================================================================== */
Object.defineProperty(window, 'S', { get: () => S });
Object.assign(window, {
  go, tog, togA, setM, setNote, toggleNote, setRoute, expJSON,
  signIn, signOut, save, render
});

/* =====================================================================
   INIT
   ===================================================================== */
document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.t===S.tab));
paintAuth();
render();
initCloud();

// Refresh relative timestamps every minute.
setInterval(()=>{ if(S.tab==='dash' && CLOUD) render(); }, 60000);
</script>
