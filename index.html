<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Marks — IB Maths Launch Dashboard</title>
<style>
:root{
  --navy:#1F3A5F; --blue:#2563EB; --green:#15803D; --amber:#B45309; --red:#DC2626;
  --bg:#F6F8FA; --card:#FFFFFF; --line:#E3E8EF; --text:#1A2331; --muted:#6B7684; --faint:#9AA5B1;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* ---------- header ---------- */
header{background:var(--navy);color:#fff;padding:16px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
header h1{font-size:17px;font-weight:800;letter-spacing:-.2px}
header .sub{font-size:12px;color:#A9BDD6}
header .spacer{flex:1}
.hbtn{background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.22);padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.hbtn:hover{background:rgba(255,255,255,.22)}
.hbtn:disabled{opacity:.4;cursor:not-allowed}
.hbtn.g{background:#fff;color:#3C4043;border-color:#fff;display:inline-flex;align-items:center;gap:8px}
.hbtn.g:hover{background:#F1F3F4}

/* ---------- auth ---------- */
.me{display:flex;align-items:center;gap:9px;padding:4px 11px 4px 4px;background:rgba(255,255,255,.11);border-radius:99px}
.av{width:27px;height:27px;border-radius:50%;background:#7C9BC0;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;flex-shrink:0;overflow:hidden}
.av img{width:100%;height:100%;object-fit:cover}
.me .nm{font-size:12.5px;font-weight:600;line-height:1.2}
.me .rl{font-size:10px;color:#A9BDD6;line-height:1.2}
.banner{padding:11px 26px;font-size:12.8px;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.banner.view{background:#EFF6FF;color:#1E40AF;border-bottom:1px solid #BFDBFE}
.banner.deny{background:#FEF2F2;color:#991B1B;border-bottom:1px solid #FECACA}
.banner.off{background:#FFFBEB;color:#92400E;border-bottom:1px solid #FDE68A}
.banner b{font-weight:800}
.banner .lnk{margin-left:auto;font-weight:700;text-decoration:underline;cursor:pointer;background:none;border:none;font-size:12.8px;font-family:inherit;color:inherit}
.ro{opacity:.55;pointer-events:none}
.by{font-size:10.5px;color:var(--faint);white-space:nowrap}
.by b{color:var(--muted);font-weight:700}
.sync{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#A9BDD6}
.dot{width:7px;height:7px;border-radius:50%;background:#4ADE80}
.dot.slow{background:#FBBF24}
.dot.dead{background:#F87171}

/* ---------- key decisions ---------- */
.decs{max-height:330px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dec{border:1px solid var(--line);border-left:3px solid #D8DEE5;border-radius:0 7px 7px 0;padding:9px 11px;background:var(--card)}
.dec.has{border-left-color:#6EE7B7;background:#F8FEFB}
.dec.flag{border-left-color:#FBBF24;background:#FFFDF7}
.dh{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.dd{font-size:9.5px;font-weight:800;color:var(--faint);background:#F1F4F7;border-radius:4px;padding:1px 5px}
.dn{font-size:12.3px;font-weight:700}
.dt{font-size:9.5px;font-weight:800;color:var(--green);background:#DCFCE7;border-radius:99px;padding:1px 7px;margin-left:auto}
.dv{font-size:12.2px;line-height:1.5;color:var(--text)}
.dv.none{color:var(--faint);font-style:italic}
.dec.flag .dv.none{color:var(--amber);font-style:normal}
.dl{display:block;margin-top:4px;font-size:11.3px;color:var(--blue);word-break:break-all}
@media(max-width:900px){ .decs{grid-template-columns:1fr} }

/* ---------- activity feed ---------- */
.feed{max-height:270px;overflow-y:auto}
.fitem{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #F1F4F7;font-size:12.5px}
.fitem:last-child{border:none}
.fitem .fav{width:23px;height:23px;border-radius:50%;background:#E2E8F0;color:#475569;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.fitem .ft{flex:1;min-width:0}
.fitem .fw{font-weight:700}
.fitem .fm{color:var(--muted)}
.fitem .fd{font-size:10.5px;color:var(--faint);white-space:nowrap}

/* ---------- tabs ---------- */
nav{background:var(--card);border-bottom:1px solid var(--line);padding:0 26px;display:flex;gap:2px;position:sticky;top:0;z-index:50;overflow-x:auto}
.tab{padding:13px 16px;border:none;background:none;cursor:pointer;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2.5px solid transparent;white-space:nowrap;font-family:inherit}
.tab:hover{color:var(--text)}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

main{padding:22px 26px 60px;max-width:1320px;margin:0 auto}

/* ---------- generic ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:18px;margin-bottom:16px}
h2.sec{font-size:16px;font-weight:800;margin-bottom:4px}
p.sub{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.row{display:flex;gap:14px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}

/* ---------- KPI ---------- */
.kpi{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:15px}
.kpi .lbl{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.kpi .val{font-size:27px;font-weight:800;line-height:1.1}
.kpi .note{font-size:11.5px;color:var(--muted);margin-top:3px}

.gate{border-radius:11px;padding:15px 18px;display:flex;align-items:center;gap:14px;margin-bottom:16px;border:1px solid}
.gate.no{background:#FEF2F2;border-color:#FCA5A5}
.gate.yes{background:#F0FDF4;border-color:#86EFAC}
.gate .icon{font-size:26px}
.gate .t{font-weight:800;font-size:14.5px}
.gate .d{font-size:12.5px;color:var(--muted);margin-top:2px}

/* ---------- progress ---------- */
.bar{background:#EDF1F5;border-radius:99px;height:9px;overflow:hidden;flex:1}
.bar>span{display:block;height:100%;border-radius:99px;background:var(--blue);transition:width .35s}
.prow{display:flex;align-items:center;gap:11px;margin-bottom:9px}
.prow .nm{width:118px;font-size:12.5px;font-weight:600;flex-shrink:0}
.prow .pc{width:52px;text-align:right;font-size:12px;font-weight:700;color:var(--muted)}

/* ---------- day strip ---------- */
.days{display:grid;grid-template-columns:repeat(10,1fr);gap:7px}
.day{border:1px solid var(--line);border-radius:9px;padding:9px 5px;text-align:center;cursor:pointer;background:var(--card);transition:.15s}
.day:hover{border-color:var(--blue)}
.day .n{font-size:17px;font-weight:800}
.day .s{font-size:9.5px;color:var(--muted);margin-top:2px}
.day .mini{height:4px;border-radius:99px;background:#EDF1F5;margin-top:6px;overflow:hidden}
.day .mini>span{display:block;height:100%;background:var(--green)}
.day.done{background:#F0FDF4;border-color:#86EFAC}
.day.active{background:#EFF6FF;border-color:var(--blue)}

/* ---------- filters ---------- */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
select,input[type=text],input[type=number],textarea{padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text);outline:none}
select:focus,input:focus,textarea:focus{border-color:var(--blue)}
.chip{padding:6px 12px;border:1px solid var(--line);border-radius:99px;background:var(--card);font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit}
.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ---------- task list ---------- */
.tgroup{margin-bottom:20px}
.thead{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--navy);color:#fff;border-radius:8px 8px 0 0}
.thead .dn{background:rgba(255,255,255,.16);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:800}
.thead .tt{font-weight:700;font-size:13.5px}
.thead .tc{margin-left:auto;font-size:11.5px;color:#B9CBE0}
.task{display:flex;gap:11px;padding:11px 13px;border:1px solid var(--line);border-top:none;background:var(--card);align-items:flex-start}
.task:last-child{border-radius:0 0 8px 8px}
.task.done{background:#FAFDFB}
.task.done .tx{text-decoration:line-through;color:var(--faint)}
.cb{width:17px;height:17px;margin-top:2px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.task .body{flex:1;min-width:0}
.task .tx{font-size:13.4px;font-weight:600}
.task .meta{font-size:11px;color:var(--muted);margin-top:6px;display:flex;gap:9px;flex-wrap:wrap;align-items:center;padding-left:50px}

/* ---------- labelled Task / Cover rows ---------- */
.lrow{display:flex;gap:8px;align-items:flex-start;margin-bottom:2px}
.lk{width:42px;flex-shrink:0;font-size:10px;font-weight:800;letter-spacing:.05em;
  text-transform:uppercase;color:var(--faint);padding-top:3px}
.cv{font-size:12.4px;color:var(--muted);line-height:1.45}
.task.done .cv{color:var(--faint)}
@media(max-width:640px){
  .lrow{flex-direction:column;gap:1px}
  .lk{width:auto;padding-top:0}
  .task .meta{padding-left:0}
}
.pill{padding:2px 7px;border-radius:99px;font-size:10px;font-weight:800;letter-spacing:.02em}
.pill.crit{background:#FEE2E2;color:var(--red)}
.pill.high{background:#FEF3C7;color:var(--amber)}
.pill.med{background:#E0E7FF;color:#4338CA}
.ws{padding:2px 7px;border-radius:5px;background:#EEF2F6;color:var(--muted);font-size:10px;font-weight:700}
.deliv{color:var(--green);font-weight:600}
/* ---------- recorded result ---------- */
.result{margin-top:8px;padding:10px 13px;background:#ECFDF5;border-left:3px solid #6EE7B7}
.rrw{display:flex;gap:9px;align-items:flex-start;margin-bottom:5px}
.rrw:last-child{margin-bottom:0}
.rk{width:44px;flex-shrink:0;font-size:10px;font-weight:800;letter-spacing:.05em;
  text-transform:uppercase;color:var(--green);padding-top:2px}
.rv{font-size:12.6px;color:#052E20;line-height:1.5}
.rl{font-size:12.4px;color:var(--blue);word-break:break-all}
.task.done .result{background:#F6FDFA}

.warn{margin-top:8px;padding:8px 12px;background:#FFFBEB;border-left:3px solid #FBBF24;
  font-size:11.8px;color:#92400E}
.task.flag{background:#FFFDF7}

/* ---------- editor panel ---------- */
.detail{display:none;margin-top:9px;padding:11px 13px;background:#FAFBFC;
  border:1px solid var(--line);border-radius:7px}
.task.open .detail{display:block}
.df{margin-bottom:9px}
.df:last-child{margin-bottom:0}
.df label{display:block;font-size:10px;font-weight:800;letter-spacing:.05em;
  text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.res-in,.link-in,.note-in{width:100%;font-size:12.4px;padding:6px 9px;
  border:1px solid var(--line);border-radius:6px;font-family:inherit;line-height:1.5}
.res-in{resize:vertical}
.res-in:focus,.link-in:focus,.note-in:focus{border-color:var(--blue);outline:none}

/* ---------- note post button ---------- */
.note-act{display:flex;align-items:center;gap:9px;margin-top:5px}
.btn-post{background:var(--blue);color:#fff;border:none;padding:5px 13px;border-radius:6px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-post:hover:not(:disabled){background:#1D4ED8}
.btn-post:disabled{background:#CBD5E1;cursor:default}
.note-hint{font-size:10.5px;color:var(--faint)}

/* ---------- reorder controls ---------- */
.reorder-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.ord-btn{width:28px;height:28px;border:1px solid var(--line);background:var(--card);
  border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;color:var(--text)}
.ord-btn:hover{background:var(--bg-2);border-color:var(--blue);color:var(--blue)}
.reorder-lbl{font-size:11.5px;color:var(--muted);margin-left:5px}
.day-sel{padding:5px 8px;font-size:12.5px}

/* ---------- getting-found grid ---------- */
.disc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.disc{border:1px solid var(--line);border-radius:9px;padding:12px 13px;background:var(--card)}
.disc-h{font-weight:800;font-size:14px;color:var(--navy)}
.disc-h span{display:block;font-size:10.5px;font-weight:600;color:var(--muted);text-transform:none;margin-top:1px}
.disc-b{font-size:12px;color:var(--text);line-height:1.5;margin-top:7px}
@media(max-width:800px){ .disc-grid{grid-template-columns:1fr} }

/* ---------- route work tracker ---------- */
.rw-toggle{margin-left:8px;background:var(--bg-2);border:1px solid var(--line);color:var(--muted);
  padding:4px 10px;border-radius:6px;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit}
.rw-toggle:hover{border-color:var(--blue);color:var(--blue)}
.rw{display:none;margin-top:10px;padding-top:12px;border-top:1px dashed var(--line)}
.rw.show{display:block}
.rw-f{margin-bottom:9px}
.rw-f label{display:block;font-size:10.5px;font-weight:800;color:var(--muted);margin-bottom:3px}
.rw-f textarea{width:100%;font-size:12.4px;padding:6px 9px;border:1px solid var(--line);
  border-radius:6px;font-family:inherit;line-height:1.5;resize:vertical}
.rw-f textarea:focus{border-color:var(--blue);outline:none}
.rw-disc{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:9px}
.rw-df label{display:block;font-size:10px;font-weight:800;color:var(--blue);margin-bottom:3px}
.rw-df input{width:100%;font-size:12px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-family:inherit}
.rw-df input:focus{border-color:var(--blue);outline:none}
@media(max-width:600px){ .rw-disc{grid-template-columns:1fr} }

/* ---------- add / remove tasks ---------- */
.pill.cust{background:#EDE9FE;color:#6D28D9}
.addbtn{margin-left:10px;background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.26);
  padding:3px 10px;border-radius:6px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.addbtn:hover{background:rgba(255,255,255,.28)}
.chip.add{border-color:#A5B4FC;color:var(--blue);font-weight:700}
.chip.add:hover{background:#EEF2FF}
.rmbtn{background:none;border:none;color:var(--faint);font-size:17px;line-height:1;cursor:pointer;
  padding:0 3px;font-family:inherit;align-self:flex-start;margin-top:1px;flex-shrink:0}
.rmbtn:hover{color:var(--red)}
.rsbtn{background:#EEF2F6;border:1px solid var(--line);color:var(--blue);font-size:11.5px;font-weight:700;
  padding:4px 11px;border-radius:6px;cursor:pointer;font-family:inherit;align-self:center;flex-shrink:0}
.rsbtn:hover{background:#E0E7FF}

.addform{border:1px solid #BFDBFE;border-top:none;background:#F8FBFF;padding:14px 15px}
.af-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.af-f{display:flex;flex-direction:column;gap:4px}
.af-f.af-wide{grid-column:1/-1}
.af-f label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.af-f input,.af-f select,.af-f textarea{padding:7px 9px;font-size:13px}
.af-f textarea{resize:vertical;line-height:1.5;font-family:inherit}
.af-act{display:flex;align-items:center;gap:9px;margin-top:12px}
.btn-add{background:var(--blue);color:#fff;border:none;padding:8px 17px;border-radius:7px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-add:hover{background:#1D4ED8}
.btn-cancel{background:none;border:1px solid var(--line);color:var(--muted);padding:8px 15px;
  border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cancel:hover{background:#F1F4F7}
.af-hint{font-size:11px;color:var(--faint);margin-left:auto}
@media(max-width:700px){ .af-grid{grid-template-columns:1fr} }
.notebtn{background:none;border:none;cursor:pointer;color:var(--faint);font-size:14px;padding:0 3px;font-family:inherit}
.notebtn:hover{color:var(--blue)}
.notebtn.has{color:var(--amber)}

/* ---------- built-in guidance ---------- */
.gbtn{width:16px;height:16px;border-radius:50%;border:1px solid #BFDBFE;background:#EFF6FF;color:var(--blue);
  font-size:10.5px;font-weight:800;cursor:pointer;font-family:inherit;line-height:1;padding:0;flex-shrink:0}
.gbtn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.guide{display:none;margin-top:8px;padding:10px 13px;background:#F5F9FF;border-left:3px solid #93C5FD;
  border-radius:0 7px 7px 0;font-size:12.4px;line-height:1.6;color:#1E3A5F}
.guide.show{display:block}
.guide b{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--blue);margin-bottom:4px}

/* ---------- route cards ---------- */
.route{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--card)}
.route .rh{padding:13px 16px;color:#fff;display:flex;align-items:center;gap:10px}
.route .rid{background:rgba(255,255,255,.2);border-radius:6px;padding:3px 9px;font-size:11.5px;font-weight:800}
.route .rt{font-weight:800;font-size:14.5px}
.route .rb{padding:14px 16px}
.rrow{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #F1F4F7;font-size:12.8px}
.rrow:last-child{border:none}
.rrow .k{width:112px;flex-shrink:0;color:var(--muted);font-weight:700;font-size:11.5px}
.rrow .v{flex:1}

/* ---------- table ---------- */
table{width:100%;border-collapse:collapse;font-size:12.8px}
th{background:var(--navy);color:#fff;text-align:left;padding:9px 11px;font-size:11.5px;font-weight:700}
th:first-child{border-radius:7px 0 0 0}
th:last-child{border-radius:0 7px 0 0}
td{padding:9px 11px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:nth-child(even){background:#FAFBFC}
td input{width:100%;padding:4px 7px;font-size:12.5px}
.st{padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:800;display:inline-block}
.st.ok{background:#DCFCE7;color:var(--green)}
.st.bad{background:#FEE2E2;color:var(--red)}
.st.none{background:#F1F4F7;color:var(--faint)}

.hint{background:#FFFBEB;border-left:3px solid #F59E0B;border-radius:0 8px 8px 0;padding:11px 14px;font-size:12.7px;color:#78350F;margin-bottom:14px}
.hint b{color:#92400E}

footer{text-align:center;padding:26px;font-size:11.5px;color:var(--faint)}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

@media(max-width:900px){
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .days{grid-template-columns:repeat(5,1fr)}
  main{padding:16px 14px 50px}
  header,nav{padding-left:14px;padding-right:14px}
}
</style>
</head>
<body>

<h2 class="sr">Full Marks Education IB Maths launch dashboard with task tracking, funnel routes, asset checklist and metrics</h2>

<header>
  <div>
    <h1>Full Marks — IB Maths AI/AA Launch</h1>
    <div class="sub">Website direct · Facebook Ads · LinkedIn <span id="syncBox"></span></div>
  </div>
  <div class="spacer"></div>
  <div id="authBox"></div>
  <button class="hbtn" onclick="expJSON()" title="Download a JSON backup">↓ Backup</button>
</header>
<div id="bannerBox"></div>

<nav>
  <button class="tab on" data-t="dash" onclick="go('dash')">Dashboard</button>
  <button class="tab" data-t="plan" onclick="go('plan')">10-Day Plan</button>
  <button class="tab" data-t="routes" onclick="go('routes')">Funnel Routes</button>
  <button class="tab" data-t="assets" onclick="go('assets')">Assets</button>
  <button class="tab" data-t="metrics" onclick="go('metrics')">Metrics</button>
  <button class="tab" data-t="ads" onclick="go('ads')">Ads Setup</button>
</nav>

<main id="main"></main>
<footer>Full Marks Education · Independently developed. Not endorsed by the International Baccalaureate Organization.</footer>

<script type="module">
/* =====================================================================
   CONFIGURATION
   Paste your two Supabase values here. Both are safe to publish —
   the anon key is protected by row-level security, not by secrecy.
   Leave them empty and the dashboard runs in browser-only mode.
   NEVER put the service_role key here.

function blank(){
  return {
    start:'2026-07-20',
    tasks:{},        // id -> {done, note, by, byName, at}
    assets:{},       // id -> {done, by, byName, at}
    metrics:{},      // id -> {tgt, act, by, byName, at}
    routes:{},       // id -> {status, by, byName, at}  (legacy: plain string)
    filter:{day:'all', ws:'all', hide:false},
    tab:'dash'
  };
}
function load(){
  try{ const r = localStorage.getItem(KEY); if(r) return Object.assign(blank(), JSON.parse(r)); }catch(e){}
  return blank();
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

/* Routes were once stored as a bare string. Normalise on read so old
   saved state keeps working. */
function routeStatus(id){
  const r = S.routes[id];
  if(!r) return 'Not started';
  return typeof r === 'string' ? r : (r.status || 'Not started');
}
function routeMeta(id){
  const r = S.routes[id];
  if(!r) return null;
  return (typeof r === 'object') ? r : {status:r};   // upgrade legacy strings
}
function routeField(id, key){ return (routeMeta(id)||{})[key] || ''; }

/* ---------- attribution ---------- */
function stamp(obj){
  if(!me) return obj;
  return Object.assign({}, obj, {by:me.email, byName:me.name, at:new Date().toISOString()});
}
function initials(n){
  return String(n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
}
function ago(iso){
  if(!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
  if(s < 45) return 'just now';
  if(s < 3600) return Math.floor(s/60) + 'm ago';
  if(s < 86400) return Math.floor(s/3600) + 'h ago';
  if(s < 604800) return Math.floor(s/86400) + 'd ago';
  return new Date(iso).toLocaleDateString();
}
function byLine(o){
  if(!o || !o.byName || !o.at) return '';
  return `<span class="by">✓ <b>${esc(o.byName)}</b> · ${ago(o.at)}</span>`;
}

/* =====================================================================
   SUPABASE — connect, authenticate, sync
   ===================================================================== */
async function initCloud(){
  if(!CLOUD){ customTasks = loadLocalCustom(); paintAuth(); render(); return; }
  try{
    const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
    sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data:{ session } } = await sb.auth.getSession();
    await onSession(session);

    sb.auth.onAuthStateChange((_e, s) => { onSession(s); });

    await pullAll();
    subscribe();
    connState = 'live';
  }catch(err){
    console.warn('Cloud init failed, staying local:', err);
    connState = 'offline';
  }
  paintAuth(); render();
}

async function onSession(session){
  if(session && session.user){
    const u = session.user;
    me = {
      email: (u.email||'').toLowerCase(),
      name: u.user_metadata?.full_name || u.user_metadata?.name || (u.email||'').split('@')[0],
      avatar: u.user_metadata?.avatar_url || u.user_metadata?.picture || ''
    };
    canEdit = await checkEditor();
  } else {
    me = null; canEdit = false;
  }
  paintAuth(); render();
}

async function checkEditor(){
  if(!sb || !me) return false;
  try{
    const { data, error } = await sb.rpc('is_editor');
    if(error){ console.warn('is_editor failed:', error.message); return false; }
    return data === true;
  }catch(e){ return false; }
}

async function signIn(){
  if(!sb) return;
  await sb.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo: window.location.href.split('#')[0] }
  });
}
async function signOut(){
  if(!sb) return;
  await sb.auth.signOut();
  me = null; canEdit = false;
  paintAuth(); render();
}

/* ---------- pull everything ---------- */
async function pullAll(){
  if(!sb) return;
  const { data, error } = await sb.from('board_state').select('*');
  if(error){ console.warn('pull failed:', error.message); connState='offline'; return; }

  const fresh = blank();
  fresh.filter = S.filter; fresh.tab = S.tab;
  for(const row of (data||[])){
    const meta = { by: row.updated_by, byName: row.updated_by_name, at: row.updated_at };
    const val = Object.assign({}, row.data, meta);
    if(row.kind === 'task')   fresh.tasks[row.item_id]   = val;
    if(row.kind === 'asset')  fresh.assets[row.item_id]  = val;
    if(row.kind === 'metric') fresh.metrics[row.item_id] = val;
    if(row.kind === 'route')  fresh.routes[row.item_id]  = val;
  }
  S = fresh; save();
  await pullCustom();
  await pullFeed();
}

async function pullCustom(){
  if(!sb){ customTasks = loadLocalCustom(); return; }
  const { data, error } = await sb.from('custom_tasks').select('*').order('created_at');
  if(error){
    // Table not created yet — degrade quietly rather than breaking the board.
    if(/does not exist|schema cache/i.test(error.message||'')){
      console.warn('custom_tasks table missing — run patch-custom-tasks.sql');
      customTasks = []; return;
    }
    console.warn('custom pull failed:', error.message); customTasks = []; return;
  }
  customTasks = data || [];
}

/* Local-mode fallback so the feature still works before the DB exists. */

function loadLocalCustom(){

async function pullFeed(){
  if(!sb) return;
  const { data, error } = await sb
    .from('activity_log').select('*')
    .order('created_at', {ascending:false}).limit(30);
  if(!error) feed = data || [];
}

/* ---------- push one item ---------- */
async function push(kind, itemId, data, label, action){
  if(!sb || !canEdit) return;
  const row = {
    kind, item_id:itemId, data,
    updated_by: me.email, updated_by_name: me.name,
    updated_at: new Date().toISOString()
  };
  const { error } = await sb.from('board_state').upsert(row, {onConflict:'kind,item_id'});
  if(error){ console.warn('push failed:', error.message); toast('Could not save — check your connection.'); return; }

  if(action){
    await sb.from('activity_log').insert({
      kind, item_id:itemId, label, action,
      actor_email: me.email, actor_name: me.name
    });
  }
}

/* ---------- realtime ---------- */
function subscribe(){
  if(!sb) return;
  sb.channel('board')
    .on('postgres_changes', {event:'*', schema:'public', table:'board_state'}, payload => {
      const r = payload.new; if(!r) return;
      if(r.updated_by === (me && me.email)) return;   // our own echo
      const val = Object.assign({}, r.data, {by:r.updated_by, byName:r.updated_by_name, at:r.updated_at});
      if(r.kind==='task')   S.tasks[r.item_id]   = val;
      if(r.kind==='asset')  S.assets[r.item_id]  = val;
      if(r.kind==='metric') S.metrics[r.item_id] = val;
      if(r.kind==='route')  S.routes[r.item_id]  = val;
      save(); render();
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'custom_tasks'}, payload => {
      const r = payload.new; if(!r) return;
      if(r.created_by === (me && me.email) && payload.eventType === 'INSERT') return;
      const i = customTasks.findIndex(c=>c.id===r.id);
      if(i >= 0) customTasks[i] = r; else customTasks.push(r);
      render();
    })
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'activity_log'}, payload => {
      if(payload.new){ feed.unshift(payload.new); feed = feed.slice(0,30);
        if(S.tab==='dash') render(); }
    })
    .subscribe(status => {
      connState = (status === 'SUBSCRIBED') ? 'live' : 'offline';
      paintSync();
    });
}

/* ---------- tiny toast ---------- */
let toastT;
function toast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1A2331;color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;z-index:999;box-shadow:0 6px 22px rgba(0,0,0,.22)';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.display='block';
  clearTimeout(toastT); toastT = setTimeout(()=>{ t.style.display='none'; }, 2600);
}

/* ---------- write guard ---------- */
function guard(){
  if(!CLOUD) return true;              // local mode: always writable
  if(!me){ toast('Sign in to make changes.'); return false; }
  if(!canEdit){ toast('Your account is not approved for editing.'); return false; }
  return true;
}

/* ---------- helpers ---------- */
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const canWrite = () => !CLOUD || canEdit;
const tDone = id => !!(S.tasks[id]||{}).done;
const aDone = id => !!(S.assets[id]||{}).done;
const pct   = (a,b) => b ? Math.round(a/b*100) : 0;

/* Built-in tasks can be hidden (never destroyed). Custom tasks live in
   their own table and are archived rather than deleted. Either way the
   removal is reversible. */
const isHidden = id => !!(S.tasks[id]||{}).hidden;

/* The single source of truth for "what tasks exist right now".
   A task's day can be overridden (dayOverride) and its position within a
   day reordered (ord). Both live in S.tasks[id] so they sync like any
   other field. _nat is the natural fallback order. */
const effDay = (id, base) => { const o=(S.tasks[id]||{}).dayOverride; return (o==null?base:o); };
const effOrd = (id, nat) => { const o=(S.tasks[id]||{}).ord; return (o==null?nat:o); };

function allTasks(){
  const built = TASKS
    .map((t,i)=>({t,i}))
    .filter(x => !isHidden(x.t.id))
    .map(({t,i})=>({ ...t, _nat:i, d: effDay(t.id, t.d) }));
  const custom = customTasks
    .filter(c => !c.archived)
    .map((c,i)=>({ id:c.id, d: effDay(c.id, c.day), w:c.workstream, p:c.priority,
                   t:c.title, v:c.deliverable || '', g:c.guidance || '', custom:true,
                   addedBy:c.created_by_name, _nat: 1000 + i }));
  return built.concat(custom).sort((a,b)=>
    a.d - b.d || effOrd(a.id, a._nat) - effOrd(b.id, b._nat)
  );
}

function removedCount(){
  return TASKS.filter(t=>isHidden(t.id)).length
       + customTasks.filter(c=>c.archived).length;
}

function stats(){
  const list = allTasks();
  const total = list.length;
  const done  = list.filter(t=>tDone(t.id)).length;
  const crit  = list.filter(t=>t.p==='Critical');
  const critDone = crit.filter(t=>tDone(t.id)).length;
  const req   = ASSETS.filter(a=>a[3]===1);
  const reqDone = req.filter(a=>aDone(a[0])).length;
  const routesReady = ROUTES.filter(r=>routeStatus(r.id)==='Ready').length;
  return {total,done,crit:crit.length,critDone,req:req.length,reqDone,routesReady};
}

function dayStats(d){
  const ts = allTasks().filter(t=>t.d===d);
  return {n:ts.length, done:ts.filter(t=>tDone(t.id)).length};
}

  else if(t==='plan')   m.innerHTML = viewPlan();
  else if(t==='routes') m.innerHTML = viewRoutes();
  else if(t==='assets') m.innerHTML = viewAssets();
  else if(t==='metrics')m.innerHTML = viewMetrics();
  else if(t==='ads')    m.innerHTML = viewAds();
}

/* =====================================================================
   DASHBOARD
   ===================================================================== */
function viewDash(){
  const s = stats();
  const gateOK = s.critDone===s.crit && s.reqDone===s.req && s.routesReady===ROUTES.length;

  // Every critical task, with whatever result has been recorded against it.
  const decisions = allTasks().filter(t=>t.p==='Critical').map(t=>{
    const st = S.tasks[t.id]||{};
    const result = (st.result||'').trim();
    return { id:t.id, d:t.d, n:t.n||t.t, done:!!st.done, result,
             link:st.link||'', flag: !!st.done && !result };
  });
  const decStats = {
    total: decisions.length,
    recorded: decisions.filter(d=>d.result).length,
    flagged: decisions.filter(d=>d.flag).length
  };

  const workstreams = [...new Set(TASKS.map(t=>t.w))];
  const wsRows = workstreams.map(w=>{
    const ts = TASKS.filter(t=>t.w===w);
    const dn = ts.filter(t=>tDone(t.id)).length;
    return `<div class="prow"><div class="nm">${w}</div><div class="bar"><span style="width:${pct(dn,ts.length)}%"></span></div><div class="pc">${dn}/${ts.length}</div></div>`;
  }).join('');

  const dayCells = Object.keys(DAYTITLES).map(d=>{
    d = +d;
    const ds = dayStats(d);
    const p = pct(ds.done, ds.n);
    const cls = p===100 ? 'done' : (ds.done>0 ? 'active' : '');
    return `<div class="day ${cls}" onclick="S.filter.day='${d}';go('plan')" title="${esc(DAYTITLES[d])}">
      <div class="n">${d}</div><div class="s">${ds.done}/${ds.n}</div>
      <div class="mini"><span style="width:${p}%"></span></div></div>`;
  }).join('');

  return `
  <div class="gate ${gateOK?'yes':'no'}">
    <div class="icon">${gateOK?'✅':'⛔'}</div>
    <div>
      <div class="t">${gateOK?'Ready for soft launch':'Not ready for soft launch'}</div>
      <div class="d">${gateOK
        ? 'All critical tasks complete, all required assets ready, all four routes tested. Launch small and watch it live.'
        : `Still open: ${s.crit-s.critDone} critical task(s) · ${s.req-s.reqDone} required asset(s) · ${ROUTES.length-s.routesReady} untested route(s).`}</div>
    </div>
  </div>

  <div class="grid4" style="margin-bottom:16px">
    <div class="kpi"><div class="lbl">Overall tasks</div><div class="val">${pct(s.done,s.total)}%</div><div class="note">${s.done} of ${s.total} complete</div></div>
    <div class="kpi"><div class="lbl">Critical tasks</div><div class="val" style="color:${s.critDone===s.crit?'var(--green)':'var(--red)'}">${pct(s.critDone,s.crit)}%</div><div class="note">${s.critDone} of ${s.crit} complete</div></div>
    <div class="kpi"><div class="lbl">Required assets</div><div class="val" style="color:${s.reqDone===s.req?'var(--green)':'var(--amber)'}">${pct(s.reqDone,s.req)}%</div><div class="note">${s.reqDone} of ${s.req} ready</div></div>
    <div class="kpi"><div class="lbl">Routes tested</div><div class="val" style="color:${s.routesReady===ROUTES.length?'var(--green)':'var(--muted)'}">${s.routesReady}/${ROUTES.length}</div><div class="note">R1 · R2 · R3 · R4</div></div>

function tog(id, v){
  if(!guard()){ const cb = document.querySelector(`#row-${id} .cb`); if(cb) cb.checked = !v; return; }
  const prev = S.tasks[id] || {};
  S.tasks[id] = stamp(Object.assign({}, prev, {done:v}));
  save();
  push('task', id, payload(id), taskLabel(id), v?'completed':'reopened');
  render();
}

/* Every write sends the whole record. Sending a partial object would blank
   whichever fields it omitted. */
function payload(id){
  const c = S.tasks[id] || {};
  const p = { done:!!c.done, note:c.note||'', result:c.result||'',
              link:c.link||'', hidden:!!c.hidden };
  if(c.ord != null) p.ord = c.ord;
  if(c.dayOverride != null) p.dayOverride = c.dayOverride;
  return p;
}

/* Works for both built-in and custom tasks. */
function taskLabel(id){
  const b = TASKS.find(x=>x.id===id); if(b) return b.t;
  const c = customTasks.find(x=>x.id===id); if(c) return c.title;
  return id;
}
function toggleNote(id){ const el = document.getElementById('row-'+id); if(el) el.classList.toggle('open'); }
function toggleGuide(id){ const el = document.getElementById('g-'+id); if(el) el.classList.toggle('show'); }

/* Only http(s) links are rendered as clickable. Anything else — javascript:,
   data:, vbscript: — is shown as plain text so a pasted link can't run code. */
function safeUrl(u){
  const s = String(u||'').trim();
  if(!s) return '';
  try{
    const p = new URL(s, 'https://x.invalid');
    return (p.protocol === 'http:' || p.protocol === 'https:') ? s : '';
  }catch(e){ return ''; }
}

let fieldT = {};
function setField(id, key, v){
  if(!guard()) return;
  const prev = S.tasks[id] || {};
  S.tasks[id] = stamp(Object.assign({}, prev, {[key]: v}));
  save();
  clearTimeout(fieldT[id+key]);
  fieldT[id+key] = setTimeout(()=>{
    push('task', id, payload(id), taskLabel(id),
         key==='result' ? 'recorded a result for' : 'added a link to');
    render();
  }, 900);
}

/* ---------- notes: manual post, no auto-save ----------
   Typing only enables the Post button. Nothing is saved until it's clicked,
   so drafts are never pushed to everyone else mid-sentence. */
function noteDirty(kind, id){
  const btn = document.getElementById(`post-${kind}-${id}`);
  const ta  = document.getElementById(`note-${kind}-${id}`);
  if(!btn || !ta) return;
  const saved = ((kind==='asset'?S.assets:S.tasks)[id]||{}).note || '';
  btn.disabled = (ta.value === saved);
}
function postNote(kind, id){
  if(!guard()) return;
  const ta = document.getElementById(`note-${kind}-${id}`);
  if(!ta) return;
  const bucket = (kind==='asset') ? S.assets : S.tasks;
  const prev = bucket[id] || {};
  bucket[id] = stamp(Object.assign({}, prev, {note: ta.value}));
  save();
  if(kind==='asset'){
    const a = ASSETS.find(x=>x[0]===id);
    push('asset', id, assetPayload(id), a?a[2]:id, 'updated a note on');
  } else {
    push('task', id, payload(id), taskLabel(id), 'updated a note on');
  }
  toast('Note posted.');
  render();
}

/* ---------- reorder tasks ---------- */
function moveTask(id, dir){
  if(!guard()) return;
  const all = allTasks();
  const t = all.find(x=>x.id===id); if(!t) return;
  const dayList = all.filter(x=>x.d===t.d);
  const idx = dayList.findIndex(x=>x.id===id);
  const j = idx + dir;
  if(j < 0 || j >= dayList.length) return;

  const arr = dayList.slice();
  const [moved] = arr.splice(idx, 1);
  arr.splice(j, 0, moved);

  // Write sequential ords across the day. Reorders are not logged to the feed.
  arr.forEach((x,k)=>{
    const prev = S.tasks[x.id] || {};
    S.tasks[x.id] = stamp(Object.assign({}, prev, {ord: k*10}));
    push('task', x.id, payload(x.id), taskLabel(x.id), null);
  });
  save(); render();
}

function moveTaskToDay(id, newDay){
  if(!guard()) return;
  newDay = +newDay;
  const t = allTasks().find(x=>x.id===id); if(!t || t.d===newDay) return;
  const inDay = allTasks().filter(x=>x.d===newDay);
  const maxOrd = inDay.length ? Math.max(...inDay.map(x=>effOrd(x.id, x._nat))) : 0;
  const prev = S.tasks[id] || {};
  S.tasks[id] = stamp(Object.assign({}, prev, {dayOverride:newDay, ord:maxOrd+10}));
  save();
  push('task', id, payload(id), taskLabel(id), 'moved to day '+newDay);
  toast('Moved to Day '+newDay+'.');
  render();
}

    <h2 class="sec">Routing decision rules</h2>

      <thead><tr><th style="width:26%">Signal</th><th style="width:20%">Route</th><th style="width:20%">Destination</th><th>Why</th></tr></thead>
      <tbody>${RULES.map(r=>`<tr><td><b>${esc(r[0])}</b></td><td>${esc(r[1])}</td><td>${esc(r[2])}</td><td style="color:var(--muted)">${esc(r[3])}</td></tr>`).join('')}</tbody>

}

/* =====================================================================
   ADD / REMOVE TASKS
   Nothing is ever destroyed. Built-in tasks are hidden, custom tasks are
   archived. "Show removed" brings anything back.
   ===================================================================== */
function openAdd(day){
  if(!guard()) return;
  addingTo = (addingTo === day) ? null : day;
  render();
  if(addingTo){
    const el = document.getElementById('ct-title');
    if(el) el.focus();
  }
}
function cancelAdd(){ addingTo = null; render(); }

async function addTask(){
  if(!guard()) return;
  const title = (document.getElementById('ct-title')?.value || '').trim();
  if(!title){ toast('Give the task a name first.'); return; }

  const rec = {
    id: 'C-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    day: +(document.getElementById('ct-day')?.value || addingTo || 1),
    workstream: document.getElementById('ct-ws')?.value || 'Product',
    priority: document.getElementById('ct-pri')?.value || 'Medium',
    title,
    deliverable: (document.getElementById('ct-deliv')?.value || '').trim(),
    guidance: (document.getElementById('ct-guide')?.value || '').trim(),
    archived: false,
    created_by: me ? me.email : null,
    created_by_name: me ? me.name : 'You',
    created_at: new Date().toISOString()
  };

  customTasks.push(rec);
  addingTo = null;
  render();

  if(sb && canEdit){
    const { error } = await sb.from('custom_tasks').insert(rec);
    if(error){
      customTasks = customTasks.filter(c=>c.id!==rec.id);   // roll back
      render();
      toast(/does not exist|schema cache/i.test(error.message)
        ? 'Run patch-custom-tasks.sql first — the table is missing.'
        : 'Could not save the task.');
      return;
    }
    await sb.from('activity_log').insert({
      kind:'task', item_id:rec.id, label:rec.title, action:'added',
      actor_email:me.email, actor_name:me.name
    });
  } else {
    saveLocalCustom();
  }
  toast('Task added to Day ' + rec.day + '.');
}

async function removeTask(id){
  if(!guard()) return;
  const custom = customTasks.find(c=>c.id===id);

  if(custom){
    custom.archived = true; render();
    if(sb && canEdit){
      const { error } = await sb.from('custom_tasks')
        .update({archived:true, updated_at:new Date().toISOString()}).eq('id', id);
      if(error){ custom.archived = false; render(); toast('Could not remove.'); return; }
      await sb.from('activity_log').insert({
        kind:'task', item_id:id, label:custom.title, action:'removed',
        actor_email:me.email, actor_name:me.name
      });
    } else saveLocalCustom();
  } else {
    const t = TASKS.find(x=>x.id===id); if(!t) return;
    const prev = S.tasks[id] || {};
    S.tasks[id] = stamp(Object.assign({}, prev, {hidden:true}));
    save(); render();
    push('task', id, payload(id), t.t, 'removed');
  }
  toast('Removed. Use “Show removed” to bring it back.');
}

async function restoreTask(id){
  if(!guard()) return;
  const custom = customTasks.find(c=>c.id===id);

  if(custom){
    custom.archived = false; render();
    if(sb && canEdit){
      await sb.from('custom_tasks')
        .update({archived:false, updated_at:new Date().toISOString()}).eq('id', id);
      await sb.from('activity_log').insert({
        kind:'task', item_id:id, label:custom.title, action:'restored',
        actor_email:me.email, actor_name:me.name
      });
    } else saveLocalCustom();
  } else {
    const t = TASKS.find(x=>x.id===id); if(!t) return;
    const prev = S.tasks[id] || {};
    const next = Object.assign({}, prev); delete next.hidden;
    S.tasks[id] = stamp(next);
    save(); render();
    push('task', id, payload(id), t.t, 'restored');
  }
  toast('Restored.');
}

function toggleRemoved(){ showRemoved = !showRemoved; render(); }

function routePayload(id){
  const c = routeMeta(id) || {};
  return { status: c.status || 'Not started',
           prepare:c.prepare||'', work:c.work||'', result:c.result||'', notes:c.notes||'',
           seo:c.seo||'', aeo:c.aeo||'', geo:c.geo||'' };
}

function setRoute(id, v){
  if(!guard()){ render(); return; }
  const prev = routeMeta(id) || {};
  S.routes[id] = stamp(Object.assign({}, prev, {status:v}));
  save();
  const r = ROUTES.find(x=>x.id===id);
  push('route', id, routePayload(id), r?`${r.id} ${r.name}`:id, `set ${v.toLowerCase()} on`);
  render();
}

let routeT = {};
function setRouteField(id, key, v){
  if(!guard()) return;
  const prev = routeMeta(id) || {};
  S.routes[id] = stamp(Object.assign({}, prev, {[key]: v}));
  save();
  clearTimeout(routeT[id+key]);
  routeT[id+key] = setTimeout(()=>{
    const r = ROUTES.find(x=>x.id===id);
    push('route', id, routePayload(id), r?`${r.id} ${r.name}`:id, null);
  }, 900);
}

function postRouteNote(id){
  if(!guard()) return;
  const ta = document.getElementById('note-route-'+id);
  if(!ta) return;
  const prev = routeMeta(id) || {};
  S.routes[id] = stamp(Object.assign({}, prev, {notes: ta.value}));
  save();
  const r = ROUTES.find(x=>x.id===id);
  push('route', id, routePayload(id), r?`${r.id} ${r.name}`:id, 'updated notes on');
  toast('Note posted.'); render();
}
function routeNoteDirty(id){
  const btn = document.getElementById('post-route-'+id);
  const ta = document.getElementById('note-route-'+id);
  if(!btn || !ta) return;
  btn.disabled = (ta.value === routeField(id,'notes'));
}
function toggleRouteWork(id){ const el=document.getElementById('rw-'+id); if(el) el.classList.toggle('show'); }

function assetPayload(id){
  const c = S.assets[id] || {};
  return { done:!!c.done, result:c.result||'', link:c.link||'', note:c.note||'' };
}
function togA(id,v){
  if(!guard()){ render(); return; }
  S.assets[id] = stamp(Object.assign({}, S.assets[id], {done:v}));
  save();
  const a = ASSETS.find(x=>x[0]===id);
  push('asset', id, assetPayload(id), a?a[2]:id, v?'marked ready':'reopened');
  render();
}
let afieldT = {};
function setAssetField(id, key, v){
  if(!guard()) return;
  const prev = S.assets[id] || {};
  S.assets[id] = stamp(Object.assign({}, prev, {[key]: v}));
  save();
  clearTimeout(afieldT[id+key]);
  afieldT[id+key] = setTimeout(()=>{
    const a = ASSETS.find(x=>x[0]===id);
    push('asset', id, assetPayload(id), a?a[2]:id, key==='result'?'recorded a result for':'added a link to');
    render();
  }, 900);
}
function toggleAssetNote(id){ const el=document.getElementById('arow-'+id); if(el) el.classList.toggle('open'); }

/* =====================================================================
   METRICS
   ===================================================================== */
function viewMetrics(){
  return `
  <div class="card">
    <h2 class="sec">Metrics that matter</h2>
    <p class="sub">Reduced from 27 to ${METRICS.length}. Enter your actuals as data comes in — status calculates automatically.</p>
    <div class="hint"><b>Do not judge too early.</b> Use the first 100–200 qualified visits and first 30–50 leads to establish a baseline. Scale a channel on lead quality and downstream behaviour, never on cheap clicks alone.</div>
    <table>
      <thead><tr><th style="width:8%">ID</th><th style="width:20%">Route</th><th style="width:30%">Metric</th><th style="width:9%">Unit</th><th style="width:12%">Target</th><th style="width:12%">Actual</th><th style="width:9%">Status</th></tr></thead>
      <tbody>
        ${METRICS.map(m=>{
          const st = S.metrics[m.id]||{};
          const tgt = st.tgt!==undefined ? st.tgt : m.tgt;
          const act = st.act!==undefined ? st.act : '';
          let badge = '<span class="st none">No data</span>';
          if(act!=='' && tgt!==''){
            const ok = parseFloat(act) >= parseFloat(tgt);
            const inv = m.m.toLowerCase().includes('cost') || m.m.toLowerCase().includes('hours to');
            const good = inv ? parseFloat(act) <= parseFloat(tgt) : ok;
            badge = good ? '<span class="st ok">On track</span>' : '<span class="st bad">Below</span>';
          }
          return `<tr>
            <td style="color:var(--faint)">${m.id}</td>
            <td>${esc(m.r)}</td>
            <td><b>${esc(m.m)}</b></td>
            <td style="color:var(--muted)">${m.u}</td>
            <td><input type="text" value="${esc(tgt)}" placeholder="—" ${canWrite()?'':'readonly'} oninput="setM('${m.id}','tgt',this.value)"></td>
            <td><input type="text" value="${esc(act)}" placeholder="—" ${canWrite()?'':'readonly'} oninput="setM('${m.id}','act',this.value)"></td>
            <td>${badge}${st.byName ? `<div style="margin-top:3px">${byLine(st)}</div>` : ''}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}
let mT;
function setM(id,k,v){
  if(!guard()) return;
  const prev = S.metrics[id] || {};
  S.metrics[id] = stamp(Object.assign({}, prev, {[k]:v}));
  save();
  clearTimeout(mT);
  mT = setTimeout(()=>{
    const cur = S.metrics[id] || {};
    const m = METRICS.find(x=>x.id===id);
    push('metric', id, {tgt:cur.tgt??'', act:cur.act??''}, m?m.m:id,
         k==='act' ? 'recorded a result for' : 'set a target for');
    render();
  }, 800);
}

/* =====================================================================
   IMPORT / EXPORT / RESET
   ===================================================================== */
function expJSON(){
  const payload = { exported: new Date().toISOString(), board: S, activity: feed };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fm-launch-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
